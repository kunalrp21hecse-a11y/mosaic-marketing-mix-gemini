<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosaic Data Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8 text-gray-800">

    <div class="max-w-3xl mx-auto bg-white p-6 rounded-lg shadow-md">
        <h1 class="text-2xl font-bold mb-4 text-blue-600">Step 1: Data Connection Test</h1>
        <p class="mb-6">Click the button below to fetch the first page of the Marketing Mix API. We need to see the exact structure before we build the charts.</p>
        
        <button id="fetchBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded mb-6">
            Fetch Data (Page 1)
        </button>

        <div id="status" class="text-sm font-semibold mb-2 text-gray-500">Status: Waiting to fetch...</div>
        
        <pre id="output" class="bg-gray-900 text-green-400 p-4 rounded-lg overflow-x-auto text-sm hidden"></pre>
    </div>

    <script>
        document.getElementById('fetchBtn').addEventListener('click', async () => {
            const outputEl = document.getElementById('output');
            const statusEl = document.getElementById('status');
            
            statusEl.textContent = "Status: Fetching data from Mosaic API...";
            statusEl.className = "text-sm font-semibold mb-2 text-yellow-600";
            outputEl.classList.remove('hidden');
            outputEl.textContent = "Loading...";

            try {
                // Hitting the exact endpoint from the challenge instructions
                const response = await fetch('https://mosaicfellowship.in/api/data/marketing/daily?page=1&limit=100');
                
                if (!response.ok) {
                    throw new Error(`API Error: ${response.status} ${response.statusText}`);
                }

                const data = await response.json();
                
                statusEl.textContent = "Status: Success! Data retrieved.";
                statusEl.className = "text-sm font-semibold mb-2 text-green-600";
                
                // Displaying the data beautifully so we can read it
                outputEl.textContent = JSON.stringify(data, null, 2);
                
            } catch (error) {
                statusEl.textContent = "Status: Failed!";
                statusEl.className = "text-sm font-semibold mb-2 text-red-600";
                
                // If there's a CORS error or block, it will show up here
                outputEl.textContent = "ERROR DETAILS:\n" + error.message + "\n\n(If this says 'Failed to fetch', it is likely a CORS error blocking browser requests. Copy this error and tell me immediately.)";
            }
        });
    </script>
</body>
</html>
